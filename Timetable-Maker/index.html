                    <input type="file" ref={fileInputRef} onChange={handleImport} accept=".txt" className="hidden" />
                  </div>
                </div>
                
                <div className="p-4 border-b border-gray-200 bg-gray-50">
                  <h3 className="text-sm font-bold text-gray-700 mb-2">タイムテーブルの表示時間</h3>
                  <div className="flex gap-2 items-center">
                    <select 
                      value={startMin} 
                      onChange={e => {
                        const val = Number(e.target.value);
                        if (val >= endMin) {
                          alert("開始時間は終了時間より前に設定してください。");
                          return;
                        }
                        setStartMin(val);
                      }}
                      className="flex-1 border border-gray-300 rounded-md p-2 text-sm outline-none bg-white"
                    >
                      {globalTimeOptions.slice(0, -1).map(opt => <option key={`s-${opt.value}`} value={opt.value}>{opt.label}</option>)}
                    </select>
                    <span className="text-gray-400">〜</span>
                    <select 
                      value={endMin} 
                      onChange={e => {
                        const val = Number(e.target.value);
                        if (val <= startMin) {
                          alert("終了時間は開始時間より後に設定してください。");
                          return;
                        }
                        setEndMin(val);
                      }}
                      className="flex-1 border border-gray-300 rounded-md p-2 text-sm outline-none bg-white"
                    >
                      {globalTimeOptions.slice(1).map(opt => <option key={`e-${opt.value}`} value={opt.value}>{opt.label}</option>)}
                    </select>
                  </div>
                </div>

                <div className="p-4 flex flex-col gap-2 max-h-[35vh] overflow-y-auto">
                  <h3 className="text-sm font-bold text-gray-700 mb-1">列の表示・追加</h3>
                  {columns.map((col, idx) => (
                    <div 
                      key={col.id} 
                      className={`flex justify-between items-center p-2 border rounded-md transition-all ${col.isVisible === false ? 'bg-gray-50 border-gray-200' : 'bg-white border-gray-300'}`}
                    >
                      <div className="flex items-center gap-2 flex-1">
                        <label className="flex items-center gap-3 cursor-pointer flex-1">
                          <input 
                            type="checkbox" 
                            checked={col.isVisible !== false} 
                            onChange={() => {
                              const newCols = columns.map(c => c.id === col.id ? { ...c, isVisible: c.isVisible === false } : c);
                              setColumns(newCols);
                              saveHistory(undefined, newCols, undefined);
                            }} 
                            className="w-4 h-4 text-blue-600 rounded" 
                          />
                          <div className={`w-4 h-4 rounded-sm border border-gray-300 ${col.isVisible === false ? 'opacity-50' : ''}`} style={{ backgroundColor: col.bgColor }}></div>
                          <span className={`text-sm font-medium ${col.isVisible === false ? 'text-gray-400' : 'text-gray-700'}`}>{col.name}</span>
                        </label>
                      </div>
                      <button onClick={() => { setEditingColumn(col); setIsSettingsOpen(false); }} className="p-1.5 text-gray-500 hover:text-blue-600"><Settings className="w-4 h-4" /></button>
                    </div>
                  ))}
                  <button onClick={addColumn} className="mt-3 w-full py-2.5 border-2 border-dashed border-gray-300 rounded-md text-sm text-gray-600 font-medium hover:border-blue-500 hover:text-blue-600 flex items-center justify-center gap-1 bg-gray-50"><Plus className="w-4 h-4" /> 新しい列を追加</button>
                </div>
                <div className="bg-gray-50 px-4 py-3 border-t flex justify-end items-center">
                  <button onClick={() => setIsSettingsOpen(false)} className="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 font-medium">閉じる</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // --- Reactアプリのレンダリング ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
