<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Apps Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        // ==========================================
        // 【設定項目】ここを編集してアプリを追加・変更できますtesss
        // ==========================================
        const APPS_CONFIG = [
            {
                title: "中学校データ分布バブルマップ",
                description: "全国の中学校の統計データを地図上にバブルチャート形式で可視化したインタラクティブなマップです。",
                link: "./School-Data-Mapping-App/", 
                gradient: "from-indigo-500 to-purple-600",
                hoverText: "text-blue-600",
                status: "available",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/><path d="M12 2v2"/><path d="M12 18v2"/></svg>`
            },
            {
                title: "タイムテーブルメーカー",
                description: "オープンキャンパスのタイムテーブルを直感的に作成できるツールです。イベントの重なりを視覚的に調整できます。",
                link: "./Timetable-Maker/",
                gradient: "from-emerald-500 to-teal-600",
                hoverText: "text-emerald-600",
                status: "available",
                // シンプルな時計アイコンに変更
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`
            },
            {
                title: "未定",
                description: "内容未定",
                link: "#",
                gradient: "from-slate-300 to-slate-400",
                hoverText: "text-slate-600",
                status: "coming-soon",
                // 工事中・開発中をイメージしたツールアイコンに変更
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`
            },
            {
                title: "未定",
                description: "内容未定",
                link: "#",
                gradient: "from-slate-300 to-slate-400",
                hoverText: "text-slate-600",
                status: "coming-soon",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`
            },
            {
                title: "未定",
                description: "内容未定",
                link: "#",
                gradient: "from-slate-300 to-slate-400",
                hoverText: "text-slate-600",
                status: "coming-soon",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`
            },
            {
                title: "未定",
                description: "内容未定",
                link: "#",
                gradient: "from-slate-300 to-slate-400",
                hoverText: "text-slate-600",
                status: "coming-soon",
                icon: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`
            }
        ];

        window.onload = () => {
            const grid = document.getElementById('projects-grid');
            const totalCount = document.getElementById('total-count');
            
            totalCount.textContent = `Total: ${APPS_CONFIG.length} Apps`;

            APPS_CONFIG.forEach(app => {
                const isComingSoon = app.status === 'coming-soon';
                const cardClass = isComingSoon 
                    ? "app-card block border border-slate-100 rounded-3xl overflow-hidden bg-white shadow-sm opacity-60 cursor-default"
                    : "app-card block group border border-slate-100 rounded-3xl overflow-hidden bg-white shadow-sm hover:shadow-2xl";
                
                const hoverTextClass = isComingSoon ? "" : `group-hover:${app.hoverText}`;
                const iconScale = isComingSoon ? "" : "group-hover:scale-110";
                const linkAttr = isComingSoon ? "" : `href="${app.link}"`;

                const badge = isComingSoon 
                    ? `<div class="absolute top-4 right-4 bg-slate-800/10 text-slate-500 text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-slate-200">Coming Soon</div>`
                    : "";

                const card = `
                    <a ${linkAttr} class="${cardClass} relative">
                        ${badge}
                        <div class="h-52 bg-gradient-to-br ${app.gradient} flex items-center justify-center p-6 text-white text-4xl">
                            <div class="${iconScale} transition-transform duration-300 opacity-80">
                                ${app.icon}
                            </div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-xl font-bold mb-3 ${hoverTextClass} transition-colors">${app.title}</h3>
                            <p class="text-slate-400 text-sm leading-relaxed">${app.description}</p>
                        </div>
                    </a>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        };
    </script>

    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            scroll-behavior: smooth;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .app-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-card:not(.cursor-default):hover {
            transform: translateY(-8px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- ナビゲーション -->
    <nav class="fixed w-full z-50 glass shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                My Lab
            </div>
        </div>
    </nav>

    <!-- ヒーローセクション -->
    <section id="home" class="pt-32 pb-16 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-6 tracking-tight">
                Webアプリケーション <br>
                <span class="text-blue-600">ショーケース</span>
            </h1>
            <p class="text-lg text-slate-600 leading-relaxed">
                自作のWebアプリやツールを公開しているポートフォリオサイトです。<br>
                GitHub Pagesを利用してホスティングしています。
            </p>
        </div>
    </section>

    <!-- プロジェクト（Webアプリ一覧） -->
    <section id="projects" class="py-20 px-6 bg-white">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-12">
                <h2 class="text-3xl font-bold">My Apps</h2>
                <span id="total-count" class="text-slate-400 text-sm">Total: 0 Apps</span>
            </div>
            
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        </div>
    </section>

</body>
</html>
